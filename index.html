    function applyNodeColor(nodeId, themeId, customColor = null) {
        if (!nodes[nodeId]) return; nodes[nodeId].themeId = themeId; nodes[nodeId].customColor = customColor;
        const nodeEl = document.getElementById(nodeId); if (!nodeEl) return;
        const headerEl = nodeEl.querySelector('.node-header');
        
        let color = '#2d2d2d'; 
        if (isLightMode) color = '#ffffff';

        if (customColor) { 
            color = customColor;
            nodeEl.style.backgroundColor = customColor; 
            nodeEl.style.borderColor = customColor; 
            if (headerEl) headerEl.style.backgroundColor = customColor; 
        } 
        else if (themeId !== 0) { 
            const theme = nodeThemes[themeId]; 
            color = theme.bg;
            nodeEl.style.backgroundColor = theme.bg; 
            nodeEl.style.borderColor = theme.border; 
            if (headerEl) headerEl.style.backgroundColor = theme.header; 
        } 
        else { 
            nodeEl.style.backgroundColor = ''; 
            nodeEl.style.borderColor = ''; 
            if (headerEl) headerEl.style.backgroundColor = ''; 
        }
        // --- 【核心重构：注入局部 CSS 变量，供 LOD 圆点渲染精准承接色彩】 ---
        nodeEl.style.setProperty('--node-color', color); 
    }

    window.startRenameVid = function(btn, nodeId, vidId) {
        const item = btn.closest('.media-video-item'); const nameSpan = item.querySelector('.video-name');
        nameSpan.contentEditable = true; nameSpan.focus();
        const range = document.createRange(); range.selectNodeContents(nameSpan);
        const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
        const finishEdit = () => {
            nameSpan.contentEditable = false; const n = nodes[nodeId];
            if (n) { const vid = n.videos.find(v => v.id === vidId); if (vid) { vid.name = nameSpan.textContent.trim() || "未命名"; nameSpan.textContent = vid.name; } }
            nameSpan.removeEventListener('blur', finishEdit);
        };
        nameSpan.addEventListener('blur', finishEdit);
        nameSpan.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); nameSpan.blur(); } };
    };

    window.triggerRelinkVid = function(btn, nodeId, vidId) {
        window.relinkData = { nodeId, vidId };
        document.getElementById('relink-video-input').click();
    };

    document.getElementById('relink-video-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file && window.relinkData) {
            const n = nodes[window.relinkData.nodeId];
            if (n) {
                const vid = n.videos.find(v => v.id === window.relinkData.vidId);
                if (vid) { vid.src = URL.createObjectURL(file); renderNodeMedia(window.relinkData.nodeId); }
            }
        }
        this.value = '';
    });

    document.getElementById('directory-input').addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        const fileMap = {};
        files.forEach(file => {
            if(file.type.startsWith('video/')) {
                fileMap[file.name] = URL.createObjectURL(file);
            }
        });

        let matchedCount = 0;
        Object.keys(nodes).forEach(nodeId => {
            const n = nodes[nodeId];
            let changed = false;
            n.videos.forEach(vid => {
                const searchName = vid.originalName || vid.name;
                if (fileMap[searchName]) {
                    vid.src = fileMap[searchName];
                    changed = true;
                    matchedCount++;
                }
            });
            if (changed) renderNodeMedia(nodeId);
        });

        alert(`扫描完毕！成功自动接通并恢复了 ${matchedCount} 个失效的视频节点线路。`);
        this.value = '';
    });

    function handleDroppedFiles(files, nodeId, isOverCanvas, mouseX, mouseY, canvasRect) {
        const n = nodes[nodeId];
        Array.from(files).forEach(file => {
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const tempImg = new Image();
                    tempImg.onload = () => {
                        let initW = tempImg.width, initH = tempImg.height;
                        if (initW > 120) { initH = (120 / initW) * initH; initW = 120; }
                        let localX = 10, localY = 10;
                        if (isOverCanvas && canvasRect) {
                            localX = (mouseX - canvasRect.left) / scale - (initW/2);
                            localY = (mouseY - canvasRect.top) / scale - (initH/2);
                        } else {
                            localX = 10 + (n.images.length * 15) % 100;
                            localY = 10 + (n.images.length * 15) % 100;
                        }
                        n.images.push({id: generateId(), src: e.target.result, x: Math.max(0,localX), y: Math.max(0,localY), w: initW, h: initH, rot: 0, z: n.images.length});
                        renderNodeMedia(nodeId);
                    };
                    tempImg.src = e.target.result;
                };
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                n.videos.push({id: generateId(), name: file.name, originalName: file.name, src: URL.createObjectURL(file)});
                renderNodeMedia(nodeId);
            }
        });
    }

    function bindNodeEvents(nodeEl, nodeId) {
        const titleEl = nodeEl.querySelector('.node-title'); const contentEl = nodeEl.querySelector('.node-textarea');
        titleEl.addEventListener('input', () => { nodes[nodeId].title = titleEl.value; });
        contentEl.addEventListener('input', () => { nodes[nodeId].content = contentEl.value; });
        nodeEl.querySelector('.node-delete-btn').addEventListener('click', (e) => { e.stopPropagation(); selectedNodes.add(nodeId); saveUndoState(); deleteSelectedNodes(); });

        nodeEl.querySelector('.btn-font-minus').addEventListener('click', (e) => { e.stopPropagation(); saveUndoState(); const n = nodes[nodeId]; n.fontSize = Math.max(10, (n.fontSize || 14) - 2); contentEl.style.fontSize = `${n.fontSize}px`; });
        nodeEl.querySelector('.btn-font-plus').addEventListener('click', (e) => { e.stopPropagation(); saveUndoState(); const n = nodes[nodeId]; n.fontSize = Math.min(48, (n.fontSize || 14) + 2); contentEl.style.fontSize = `${n.fontSize}px`; });

        nodeEl.querySelector('.resize-handle').addEventListener('mousedown', (e) => {
            if (isScissorsMode) return; e.stopPropagation(); setGlobalSelect(true);
            let startW = nodes[nodeId].w, startH = nodes[nodeId].h, startX = e.clientX, startY = e.clientY;
            const doResize = (em) => {
                nodes[nodeId].w = Math.max(200, startW + (em.clientX - startX) / scale); nodes[nodeId].h = Math.max(150, startH + (em.clientY - startY) / scale);
                nodeEl.style.width = `${nodes[nodeId].w}px`; nodeEl.style.height = `${nodes[nodeId].h}px`; updateLinePositions();
            };
            const stopResize = () => { setGlobalSelect(false); window.removeEventListener('mousemove', doResize); window.removeEventListener('mouseup', stopResize); };
            window.addEventListener('mousemove', doResize); window.addEventListener('mouseup', stopResize);
        });

        nodeEl.querySelector('.btn-add-img').addEventListener('click', (e) => { e.stopPropagation(); window.activeMediaNode = nodeId; document.getElementById('image-upload-input').click(); });
        nodeEl.querySelector('.btn-add-vid').addEventListener('click', (e) => { e.stopPropagation(); window.activeMediaNode = nodeId; document.getElementById('video-upload-input').click(); });

        // --- 【安全重构】：隐形拉线热区事件绑定，精准拦截单击，强制双击拖拽 ---
        const touchPort = nodeEl.querySelector('.node-touch-port');
        let portTapTime = 0;
        let portTapX = 0;
        let portTapY = 0;

        touchPort.addEventListener('touchstart', (e) => {
            if (isScissorsMode || e.touches.length !== 1) return;
            e.preventDefault(); e.stopPropagation(); // 阻止事件穿透及背景新建

            const touch = e.touches[0];
            const now = Date.now();
            
            // 必须是 $350ms$ 内的快速双击
            const isDoubleTapPort = (portTapX && Math.hypot(touch.clientX - portTapX, touch.clientY - portTapY) < 30 && now - portTapTime < 350);

            if (isDoubleTapPort) {
                // 双击第二次按下：激活拉线模式！
                isConnecting = true;
                isDraggingNode = false; 
                isPanning = false;
                connectStartNodeId = nodeId;
                activeTouchId = touch.identifier; // 同步触摸ID，确保touchmove能追踪此手势
                lastX = touch.clientX;
                lastY = touch.clientY;
                tempLineEnd = screenToWorkspace(touch.clientX, touch.clientY);
                drawAllLines();
                portTapX = null; // 重置双击判定
            } else {
                // 第一次按下，仅记录坐标时间。
                // 触屏端单击隐形区域不应该唤醒任何高亮，直接冒泡充当“点击空白背景”
                portTapTime = now;
                portTapX = touch.clientX;
                portTapY = touch.clientY;
            }
        }, { passive: false });

        nodeEl.addEventListener('dragover', (e) => {
            e.preventDefault(); e.stopPropagation();
            if (e.dataTransfer) { e.dataTransfer.dropEffect = 'copy'; }
            const canvas = nodeEl.querySelector('.image-canvas-container');
            if (canvas) {
                const rect = canvas.getBoundingClientRect();
                const isOver = e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom;
                if (isOver) { canvas.classList.add('drag-over-canvas'); nodeEl.classList.remove('drop-target'); }
                else { nodeEl.classList.add('drop-target'); canvas.classList.remove('drag-over-canvas'); }
            } else nodeEl.classList.add('drop-target');
        });
        nodeEl.addEventListener('dragleave', (e) => { e.preventDefault(); e.stopPropagation(); nodeEl.classList.remove('drop-target'); const canvas = nodeEl.querySelector('.image-canvas-container'); if(canvas) canvas.classList.remove('drag-over-canvas'); });
        nodeEl.addEventListener('drop', (e) => {
            e.preventDefault(); e.stopPropagation(); nodeEl.classList.remove('drop-target'); const canvas = nodeEl.querySelector('.image-canvas-container');
            let isOver = false, rect = null;
            if (canvas) { canvas.classList.remove('drag-over-canvas'); rect = canvas.getBoundingClientRect(); isOver = e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom; }
            if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length > 0) handleDroppedFiles(e.dataTransfer.files, nodeId, isOver, e.clientX, e.clientY, rect);
        });

        const gallery = nodeEl.querySelector('.media-gallery');
        
        gallery.addEventListener('mousedown', (e) => {
            if (isScissorsMode || e.button !== 0 || e.target.closest('.video-name') || e.target.closest('.video-actions')) return;
            
            if (e.target.closest('.video-list-resizer')) {
                e.stopPropagation(); setGlobalSelect(true);
                isResizingVidList = true; resizeVidListNodeId = nodeId; resizeVidListStartY = e.clientY;
                resizeVidListStartH = nodes[nodeId].vidListHeight || 100;
                document.body.style.cursor = 'ns-resize';
                return;
            }

            const container = e.target.closest('.image-canvas-container');
            if (container) {
                if (e.target === container) {
                    e.stopPropagation(); setGlobalSelect(true);
                    selectedMiniImgs.clear(); activeCanvasNodeId = nodeId;
                    document.querySelectorAll('.mini-img-wrapper').forEach(w => w.classList.remove('active-img'));
                    
                    isCanvasSelecting = true;
                    const rect = container.getBoundingClientRect();
                    canvasSelectionStartX = (e.clientX - rect.left) / scale;
                    canvasSelectionStartY = (e.clientY - rect.top) / scale;
                    
                const cBox = document.getElementById(`c-box-${activeCanvasNodeId}`);
                    if(cBox) {
                        cBox.style.left = canvasSelectionStartX + 'px'; cBox.style.top = canvasSelectionStartY + 'px';
                        cBox.style.width = '0px'; cBox.style.height = '0px';
                        cBox.style.display = 'block';
                    }
                    return;
                }

                const wrapper = e.target.closest('.mini-img-wrapper');
                if (!wrapper) return;

                e.stopPropagation(); setGlobalSelect(true);
                const imgId = wrapper.dataset.id; activeCanvasNodeId = nodeId;
                
                if (!e.shiftKey && !selectedMiniImgs.has(imgId)) { selectedMiniImgs.clear(); }
                selectedMiniImgs.add(imgId);
                
                document.querySelectorAll('.mini-img-wrapper').forEach(w => w.classList.remove('active-img'));
                selectedMiniImgs.forEach(id => {
                    const el = document.querySelector(`#${nodeId} .mini-img-wrapper[data-id="${id}"]`);
                    if (el) el.classList.add('active-img');
                });

                miniImgStartData = {};
                selectedMiniImgs.forEach(id => {
                    const img = nodes[nodeId].images.find(i => i.id === id);
                    miniImgStartData[id] = { x: img.x, y: img.y, w: img.w, h: img.h, rot: img.rot || 0, ratio: img.w / img.h };
                });
                
                miniImgStartX = e.clientX / scale; miniImgStartY = e.clientY / scale;

                if (e.target.classList.contains('mh-resize')) {
                    isResizingMiniImg = true; activeResizeDir = e.target.dataset.dir; 
                    document.body.style.cursor = 'nwse-resize';
                } else if (e.target.classList.contains('mh-rotate-handle')) {
                    isRotatingMiniImg = true;
                    const rect = wrapper.getBoundingClientRect();
                    rotateCenterScreenX = rect.left + rect.width / 2; rotateCenterScreenY = rect.top + rect.height / 2;
                    startMouseAngle = Math.atan2(e.clientY - rotateCenterScreenY, e.clientX - rotateCenterScreenX) * 180 / Math.PI;
                    document.body.style.cursor = 'crosshair';
                } else if (e.target.tagName === 'IMG') {
                    // 鼠标双击图片进入预览
                    const imgSrc = e.target.src;
                    const now = Date.now();
                    if (lastImgTouchSrc === imgSrc && now - lastImgTouchTime < 350) {
                        window.openImagePreview(imgSrc);
                        lastImgTouchSrc = null;
                        return;
                    }
                    lastImgTouchSrc = imgSrc;
                    lastImgTouchTime = now;

                    let maxZ = Math.max(0, ...nodes[nodeId].images.map(i => i.z || 0));
                    selectedMiniImgs.forEach(id => {
                        const img = nodes[nodeId].images.find(i => i.id === id);
                        img.z = ++maxZ;
                        const el = document.querySelector(`#${nodeId} .mini-img-wrapper[data-id="${id}"]`);
                        if(el) el.style.zIndex = img.z;
                    });
                    isDraggingMiniImg = true; document.body.style.cursor = 'grabbing';
                }
                return;
            }

            if (e.target.closest('.image-canvas-resizer')) {
                e.stopPropagation(); setGlobalSelect(true);
                isResizingCanvas = true; resizeCanvasNodeId = nodeId; resizeCanvasStartY = e.clientY;
                resizeCanvasStartH = nodes[nodeId].imgCanvasHeight || 120;
                document.body.style.cursor = 'ns-resize';
            }
        });

        // --- 【全面适配小画布、列表上下 Resizer 杆的 iPad / 手机高优先触控拉伸】 ---
        // 注意：不调stopPropagation()，让事件冒泡到workspaceContainer设置activeTouchId
        gallery.addEventListener('touchstart', (e) => {
            if (isScissorsMode || e.touches.length !== 1) return;
            const target = e.target;
            const touch = e.touches[0];
            
            // 0. 图片缩放把手
            if (target.closest('.mh-resize')) {
                e.preventDefault();
                const wrapper = target.closest('.mini-img-wrapper');
                const imgId = wrapper.dataset.id;
                selectedMiniImgs.clear(); selectedMiniImgs.add(imgId);
                document.querySelectorAll('.mini-img-wrapper').forEach(w => w.classList.remove('active-img'));
                wrapper.classList.add('active-img');
                activeCanvasNodeId = nodeId;
                isResizingMiniImg = true;
                activeResizeDir = target.dataset.dir;
                miniImgStartX = touch.clientX / scale;
                miniImgStartY = touch.clientY / scale;
                miniImgStartData = {};
                const img = nodes[nodeId].images.find(i => i.id === imgId);
                if (img) miniImgStartData[imgId] = { x: img.x, y: img.y, w: img.w, h: img.h, rot: img.rot || 0, ratio: img.w / img.h };
                return;
            }
            
            // 0b. 图片旋转把手
            if (target.closest('.mh-rotate-handle')) {
                e.preventDefault();
                const wrapper = target.closest('.mini-img-wrapper');
                const imgId = wrapper.dataset.id;
                selectedMiniImgs.clear(); selectedMiniImgs.add(imgId);
                document.querySelectorAll('.mini-img-wrapper').forEach(w => w.classList.remove('active-img'));
                wrapper.classList.add('active-img');
                activeCanvasNodeId = nodeId;
                isRotatingMiniImg = true;
                const rect = wrapper.getBoundingClientRect();
                rotateCenterScreenX = rect.left + rect.width / 2;
                rotateCenterScreenY = rect.top + rect.height / 2;
                startMouseAngle = Math.atan2(touch.clientY - rotateCenterScreenY, touch.clientX - rotateCenterScreenX) * 180 / Math.PI;
                miniImgStartData = {};
                const img = nodes[nodeId].images.find(i => i.id === imgId);
                if (img) miniImgStartData[imgId] = { x: img.x, y: img.y, w: img.w, h: img.h, rot: img.rot || 0, ratio: img.w / img.h };
                return;
            }
            
            // 0c. 图片本身（拖拽移动 + 双击预览）
            if (target.tagName === 'IMG' && target.closest('.mini-img-wrapper')) {
                const wrapper = target.closest('.mini-img-wrapper');
                const imgId = wrapper.dataset.id;
                const imgSrc = target.src;
                const now = Date.now();

                // 双击判定：350ms内点击同一张图片则进入预览
                if (lastImgTouchSrc === imgSrc && now - lastImgTouchTime < 350) {
                    e.preventDefault();
                    window.openImagePreview(imgSrc);
                    lastImgTouchSrc = null;
                    return;
                }
                // 单击：记录并准备拖拽
                lastImgTouchSrc = imgSrc;
                lastImgTouchTime = now;

                e.preventDefault();
                if (!selectedMiniImgs.has(imgId)) { selectedMiniImgs.clear(); }
                selectedMiniImgs.add(imgId);
                document.querySelectorAll('.mini-img-wrapper').forEach(w => w.classList.remove('active-img'));
                selectedMiniImgs.forEach(id => {
                    const el = document.querySelector(`#${nodeId} .mini-img-wrapper[data-id="${id}"]`);
                    if (el) el.classList.add('active-img');
                });
                activeCanvasNodeId = nodeId;
                isDraggingMiniImg = true;
                miniImgStartX = touch.clientX / scale;
                miniImgStartY = touch.clientY / scale;
                miniImgStartData = {};
                selectedMiniImgs.forEach(id => {
                    const img = nodes[nodeId].images.find(i => i.id === id);
                    if (img) miniImgStartData[id] = { x: img.x, y: img.y, w: img.w, h: img.h, rot: img.rot || 0, ratio: img.w / img.h };
                });
                let maxZ = Math.max(0, ...nodes[nodeId].images.map(i => i.z || 0));
                selectedMiniImgs.forEach(id => {
                    const img = nodes[nodeId].images.find(i => i.id === id);
                    if (img) { img.z = ++maxZ; const el = document.querySelector(`#${nodeId} .mini-img-wrapper[data-id="${id}"]`); if (el) el.style.zIndex = img.z; }
                });
                return;
            }

            // 0d. 点击画布空白区域开始框选
            if (target.closest('.image-canvas-container') && !target.closest('.mini-img-wrapper') && !target.closest('.canvas-selection-box')) {
                e.preventDefault();
                selectedMiniImgs.clear();
                activeCanvasNodeId = nodeId;
                document.querySelectorAll('.mini-img-wrapper').forEach(w => w.classList.remove('active-img'));
                isCanvasSelecting = true;
                const container = target.closest('.image-canvas-container');
                const rect = container.getBoundingClientRect();
                canvasSelectionStartX = (touch.clientX - rect.left) / scale;
                canvasSelectionStartY = (touch.clientY - rect.top) / scale;
                const cBox = document.getElementById(`c-box-${nodeId}`);
                if (cBox) {
                    cBox.style.left = canvasSelectionStartX + 'px';
                    cBox.style.top = canvasSelectionStartY + 'px';
                    cBox.style.width = '0px';
                    cBox.style.height = '0px';
                    cBox.style.display = 'block';
                }
                return;
            }

            // 1. 视频列表高度拖拽上下杆
            if (target.closest('.video-list-resizer')) {
                e.preventDefault(); setGlobalSelect(true);
                isResizingVidListTouch = true;
                touchResizeVidListNodeId = nodeId;
                touchResizeVidListStartY = touch.clientY;
                touchResizeVidListStartH = nodes[nodeId].vidListHeight || 100;
                return;
            }
            
            // 2. 小图片画布高度拖拽上下杆
            if (target.closest('.image-canvas-resizer')) {
                e.preventDefault(); setGlobalSelect(true);
                isResizingCanvasTouch = true;
                touchResizeCanvasNodeId = nodeId;
                touchResizeCanvasStartY = touch.clientY;
                touchResizeCanvasStartH = nodes[nodeId].imgCanvasHeight || 120;
                return;
            }
        }, { passive: true });

        // --- gallery专属touchmove：直接在gallery上处理图片操作，不依赖workspaceContainer冒泡 ---
        gallery.addEventListener('touchmove', (e) => {
            if (e.touches.length !== 1) return;
            const touch = e.touches[0];

            if (isDraggingMiniImg && activeCanvasNodeId === nodeId) {
                e.preventDefault();
                const dx = (touch.clientX / scale) - miniImgStartX;
                const dy = (touch.clientY / scale) - miniImgStartY;
                selectedMiniImgs.forEach(imgId => {
                    const img = nodes[nodeId].images.find(i => i.id === imgId);
                    const startData = miniImgStartData[imgId];
                    if (!img || !startData) return;
                    img.x = startData.x + dx;
                    img.y = startData.y + dy;
                    const el = document.querySelector(`#${nodeId} .mini-img-wrapper[data-id="${imgId}"]`);
                    if (el) el.style.transform = `translate(${img.x}px, ${img.y}px) rotate(${img.rot||0}deg)`;
                });
                return;
            }

            if (isResizingMiniImg && activeCanvasNodeId === nodeId) {
                e.preventDefault();
                const dx = (touch.clientX / scale) - miniImgStartX;
                selectedMiniImgs.forEach(imgId => {
                    const img = nodes[nodeId].images.find(i => i.id === imgId);
                    const startData = miniImgStartData[imgId];
                    if (!img || !startData) return;
                    let nw = startData.w;
                    if (activeResizeDir === 'br' || activeResizeDir === 'tr') nw = Math.max(20, startData.w + dx);
                    else nw = Math.max(20, startData.w - dx);
                    let nh = nw / startData.ratio;
                    if (activeResizeDir === 'tl') { img.x = startData.x + startData.w - nw; img.y = startData.y + startData.h - nh; }
                    else if (activeResizeDir === 'tr') { img.y = startData.y + startData.h - nh; }
                    else if (activeResizeDir === 'bl') { img.x = startData.x + startData.w - nw; }
                    img.w = nw; img.h = nh;
                    const el = document.querySelector(`#${nodeId} .mini-img-wrapper[data-id="${imgId}"]`);
                    if (el) { el.style.width = `${img.w}px`; el.style.height = `${img.h}px`; el.style.transform = `translate(${img.x}px, ${img.y}px) rotate(${img.rot||0}deg)`; }
                });
                return;
            }

            if (isRotatingMiniImg && activeCanvasNodeId === nodeId) {
                e.preventDefault();
                const wrapper = document.querySelector(`#${nodeId} .mini-img-wrapper.active-img`);
                if (!wrapper) return;
                const rect = wrapper.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const curAngle = Math.atan2(touch.clientY - cy, touch.clientX - cx) * 180 / Math.PI;
                const dAngle = curAngle - startMouseAngle;
                selectedMiniImgs.forEach(imgId => {
                    const img = nodes[nodeId].images.find(i => i.id === imgId);
                    if (!img) return;
                    img.rot = (miniImgStartData[imgId] ? miniImgStartData[imgId].rot : 0) + dAngle;
                    const el = document.querySelector(`#${nodeId} .mini-img-wrapper[data-id="${imgId}"]`);
                    if (el) el.style.transform = `translate(${img.x}px, ${img.y}px) rotate(${img.rot}deg)`;
                });
                return;
            }

            if (isResizingCanvasTouch && touchResizeCanvasNodeId === nodeId) {
                e.preventDefault();
                const dy = (touch.clientY - touchResizeCanvasStartY) / scale;
                const nh = Math.max(60, touchResizeCanvasStartH + dy);
                nodes[nodeId].imgCanvasHeight = nh;
                const el = document.querySelector(`#${nodeId} .image-canvas-container`);
                if (el) el.style.height = `${nh}px`;
                return;
            }

            if (isResizingVidListTouch && touchResizeVidListNodeId === nodeId) {
                e.preventDefault();
                const dy = (touch.clientY - touchResizeVidListStartY) / scale;
                const nh = Math.max(40, touchResizeVidListStartH + dy);
                nodes[nodeId].vidListHeight = nh;
                const el = document.querySelector(`#${nodeId} .video-list-container`);
                if (el) el.style.height = `${nh}px`;
                return;
            }

            // 画布框选
            if (isCanvasSelecting && activeCanvasNodeId === nodeId) {
                e.preventDefault();
                const container = document.querySelector(`#${nodeId} .image-canvas-container`);
                if (!container) return;
                const cRect = container.getBoundingClientRect();
                const curX = (touch.clientX - cRect.left) / scale;
                const curY = (touch.clientY - cRect.top) / scale;
                const l = Math.min(canvasSelectionStartX, curX);
                const t = Math.min(canvasSelectionStartY, curY);
                const w = Math.abs(curX - canvasSelectionStartX);
                const h = Math.abs(curY - canvasSelectionStartY);
                const cBox = document.getElementById(`c-box-${nodeId}`);
                if (cBox) {
                    cBox.style.left = `${l}px`;
                    cBox.style.top = `${t}px`;
                    cBox.style.width = `${w}px`;
                    cBox.style.height = `${h}px`;
                }
                selectedMiniImgs.clear();
                nodes[nodeId].images.forEach(img => {
                    const ir = img.x + img.w, ib = img.y + img.h;
                    if (img.x < l + w && ir > l && img.y < t + h && ib > t) selectedMiniImgs.add(img.id);
                });
                document.querySelectorAll(`#${nodeId} .mini-img-wrapper`).forEach(wrapper => {
                    if (selectedMiniImgs.has(wrapper.dataset.id)) wrapper.classList.add('active-img');
                    else wrapper.classList.remove('active-img');
                });
                return;
            }
        }, { passive: false });

        // --- gallery专属touchend：重置图片操作状态 ---
        gallery.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                isDraggingMiniImg = false;
                isResizingMiniImg = false;
                isRotatingMiniImg = false;
                isResizingCanvasTouch = false;
                isResizingVidListTouch = false;
                isCanvasSelecting = false;
                activeCanvasNodeId = null;
                document.querySelectorAll('.canvas-selection-box').forEach(b => b.style.display = 'none');
            }
        });
    }

    // 平移区域判定
    function isBackgroundEvent(e) { 
        return !e.target.closest('.node') && 
               !e.target.closest('#toolbar') && 
               !e.target.closest('#media-preview-modal') && 
               !e.target.closest('.connection-hitbox') &&
               !e.target.closest('#left-toolbar'); 
    }

    // --- 【复制与克隆节点的底抽象函数接口】 ---
    function performCopySelectedNodes() {
        if (selectedNodes.size === 0) return;
        const clipboard = [];
        selectedNodes.forEach(id => {
            const n = nodes[id];
            if (n) {
                clipboard.push({
                    originalId: id,
                    x: n.x,
                    y: n.y,
                    w: n.w,
                    h: n.h,
                    title: n.title,
                    content: n.content,
                    themeId: n.themeId,
                    customColor: n.customColor,
                    fontSize: n.fontSize || 14,
                    imgCanvasHeight: n.imgCanvasHeight || 120,
                    vidListHeight: n.vidListHeight || 100,
                    images: JSON.parse(JSON.stringify(n.images || [])),
                    videos: JSON.parse(JSON.stringify(n.videos || []))
                });
            }
        });
        copiedNodesClipboard = clipboard;
    }

    function performPasteNodes(offsetAmount = 30) {
        if (!copiedNodesClipboard || copiedNodesClipboard.length === 0) return;
        
        const newIdsMap = {}; 
        const pastedIds = [];

        copiedNodesClipboard.forEach(item => {
            const newId = generateId();
            newIdsMap[item.originalId] = newId;

            const pastedImgs = (item.images || []).map(img => {
                return { ...img, id: generateId() };
            });
            const pastedVids = (item.videos || []).map(vid => {
                return { ...vid, id: generateId() };
            });

            createNode(
                item.x + offsetAmount, 
                item.y + offsetAmount, 
                item.title + " (复本)", 
                item.content, 
                item.w, 
                item.h, 
                newId, 
                item.themeId, 
                item.customColor, 
                pastedImgs, 
                pastedVids, 
                item.imgCanvasHeight,
                item.fontSize,
                item.vidListHeight
            );
            pastedIds.push(newId);
        });

        connections.forEach(conn => {
            if (newIdsMap[conn.from] && newIdsMap[conn.to]) {
                connections.push({
                    from: newIdsMap[conn.from],
                    to: newIdsMap[conn.to]
                });
            }
        });

        clearSelection();
        pastedIds.forEach(id => selectedNodes.add(id));
        updateSelectionVisuals();
        drawAllLines();

        copiedNodesClipboard.forEach(item => {
            item.x += offsetAmount;
            item.y += offsetAmount;
        });
    }

    // --- 【Photoshop 级多维度智能磁吸对齐坐标判定】 ---
    function getSmartSnapCoords(id, targetX, targetY) {
        let snapX = null;
        let snapY = null;
        const snapThreshold = 15; 
        const currentW = nodes[id].w;
        const currentH = nodes[id].h;

        const cLeft = targetX;
        const cRight = targetX + currentW;
        const cCenterX = targetX + currentW / 2;
        
        const cTop = targetY;
        const cBottom = targetY + currentH;
        const cCenterY = targetY + currentH / 2;

        let guidelines = []; 

        for (let otherId in nodes) {
            if (otherId === id || selectedNodes.has(otherId)) continue;
            const o = nodes[otherId];
            const oLeft = o.x;
            const oRight = o.x + o.w;
            const oCenterX = o.x + o.w / 2;
            
            const oTop = o.y;
            const oBottom = o.y + o.h;
            const oCenterY = o.y + o.h / 2;

            // 横向对齐判定 (垂直辅助线)
            if (snapX === null) {
                if (Math.abs(cLeft - oLeft) < snapThreshold) {
                    snapX = oLeft;
                    guidelines.push({ type: 'v', val: oLeft, min: Math.min(cTop, oTop), max: Math.max(cBottom, oBottom) });
                }
                else if (Math.abs(cLeft - oRight) < snapThreshold) {
                    snapX = oRight;
                    guidelines.push({ type: 'v', val: oRight, min: Math.min(cTop, oTop), max: Math.max(cBottom, oBottom) });
                }
                else if (Math.abs(cRight - oLeft) < snapThreshold) {
                    snapX = oLeft - currentW;
                    guidelines.push({ type: 'v', val: oLeft, min: Math.min(cTop, oTop), max: Math.max(cBottom, oBottom) });
                }
                else if (Math.abs(cRight - oRight) < snapThreshold) {
                    snapX = oRight - currentW;
                    guidelines.push({ type: 'v', val: oRight, min: Math.min(cTop, oTop), max: Math.max(cBottom, oBottom) });
                }
                else if (Math.abs(cCenterX - oCenterX) < snapThreshold) {
                    snapX = oCenterX - currentW / 2;
                    guidelines.push({ type: 'v', val: oCenterX, min: Math.min(cTop, oTop), max: Math.max(cBottom, oBottom) });
                }
            }

            // 纵向对齐判定 (水平辅助线)
            if (snapY === null) {
                if (Math.abs(cTop - oTop) < snapThreshold) {
                    snapY = oTop;
                    guidelines.push({ type: 'h', val: oTop, min: Math.min(cLeft, oLeft), max: Math.max(cRight, oRight) });
                }
                else if (Math.abs(cTop - oBottom) < snapThreshold) {
                    snapY = oBottom;
                    guidelines.push({ type: 'h', val: oBottom, min: Math.min(cLeft, oLeft), max: Math.max(cRight, oRight) });
                }
                else if (Math.abs(cBottom - oTop) < snapThreshold) {
                    snapY = oTop - currentH;
                    guidelines.push({ type: 'h', val: oTop, min: Math.min(cLeft, oLeft), max: Math.max(cRight, oRight) });
                }
                else if (Math.abs(cBottom - oBottom) < snapThreshold) {
                    snapY = oBottom - currentH;
                    guidelines.push({ type: 'h', val: oBottom, min: Math.min(cLeft, oLeft), max: Math.max(cRight, oRight) });
                }
                else if (Math.abs(cCenterY - oCenterY) < snapThreshold) {
                    snapY = oCenterY - currentH / 2;
                    guidelines.push({ type: 'h', val: oCenterY, min: Math.min(cLeft, oLeft), max: Math.max(cRight, oRight) });
                }
            }
        }

        return {
            x: snapX !== null ? snapX : targetX,
            y: snapY !== null ? snapY : targetY,
            lines: guidelines
        };
    }

    // --- 【Photoshop 智能辅助引导线绘制】 ---
    function drawSnapGuidelines(lines) {
        if (!lines || lines.length === 0) {
            svgGuidelines.innerHTML = '';
            return;
        }
        let html = '';
        lines.forEach(line => {
            const padding = 80; 
            const min = line.min - padding;
            const max = line.max + padding;

            if (line.type === 'h') {
                html += `<line x1="${min}" y1="${line.val}" x2="${max}" y2="${line.val}" stroke="#d946ef" stroke-width="1.5" stroke-dasharray="5,5" />`;
            } else {
                html += `<line x1="${line.val}" y1="${min}" x2="${line.val}" y2="${max}" stroke="#d946ef" stroke-width="1.5" stroke-dasharray="5,5" />`;
            }
        });
        svgGuidelines.innerHTML = html;
    }

    function clearSnapGuidelines() {
        svgGuidelines.innerHTML = '';
    }

    // --- 【画布边缘检测与全自动推移平移系统】 ---
    function checkEdgeScroll(clientX, clientY) {
        const threshold = 50; 
        const speed = 10; 
        const rect = workspaceContainer.getBoundingClientRect();
        
        edgeScrollSpeedX = 0;
        edgeScrollSpeedY = 0;

        if (isDraggingNode || isConnecting) {
            if (clientX < rect.left + threshold) {
                edgeScrollSpeedX = speed;
            } else if (clientX > rect.right - threshold) {
                edgeScrollSpeedX = -speed;
            }

            if (clientY < rect.top + threshold) {
                edgeScrollSpeedY = speed;
            } else if (clientY > rect.bottom - threshold) {
                edgeScrollSpeedY = -speed;
            }
        }

        if (edgeScrollSpeedX !== 0 || edgeScrollSpeedY !== 0) {
            if (!edgeScrollInterval) {
                edgeScrollInterval = requestAnimationFrame(updateEdgeScroll);
            }
        } else {
            if (edgeScrollInterval) {
                cancelAnimationFrame(edgeScrollInterval);
                edgeScrollInterval = null;
            }
        }
    }

    function updateEdgeScroll() {
        if (!isDraggingNode && !isConnecting) {
            edgeScrollInterval = null;
            clearSnapGuidelines();
            return;
        }

        panX += edgeScrollSpeedX;
        panY += edgeScrollSpeedY;
        updateWorkspaceTransform();
        
        if (isDraggingNode) {
            dragStartMouseX += edgeScrollSpeedX;
            dragStartMouseY += edgeScrollSpeedY;
            // 滚动更新时不附带原生 e
            triggerNodeDragUpdate(null);
        }
        if (isConnecting) {
            tempLineEnd = screenToWorkspace(lastX, lastY);
            updateLinePositions();
        }

        edgeScrollInterval = requestAnimationFrame(updateEdgeScroll);
    }

    // --- 【高阶：重构函数接受原生事件 e，使 Alt 克隆完美捕获】 ---
    function triggerNodeDragUpdate(e) {
        const dx = (lastX - dragStartMouseX) / scale, dy = (lastY - dragStartMouseY) / scale;
        
        // --- 【按住 Alt 拖动克隆实时生成判定】 ---
        if (e && e.altKey && !altDraggingCopied) {
            altDraggingCopied = true;
            saveUndoState();
            performPasteNodes(0); // 瞬间就地物理克隆
            
            // 将拖动初始位置转移给新的复制集
            draggedNodesInitialPositions = {};
            selectedNodes.forEach(id => {
                if (nodes[id]) draggedNodesInitialPositions[id] = { x: nodes[id].x, y: nodes[id].y };
            });
        }

        selectedNodes.forEach(id => {
            if(draggedNodesInitialPositions[id]) {
                let targetX = draggedNodesInitialPositions[id].x + dx;
                let targetY = draggedNodesInitialPositions[id].y + dy;
                
                if (isGridSnap) {
                    const snapResult = getSmartSnapCoords(id, targetX, targetY);
                    targetX = snapResult.x;
                    targetY = snapResult.y;
                    drawSnapGuidelines(snapResult.lines);
                } else {
                    clearSnapGuidelines();
                }

                nodes[id].x = targetX; nodes[id].y = targetY;
                const el = document.getElementById(id); 
                if (el) {
                    el.style.left = `${nodes[id].x}px`; el.style.top = `${nodes[id].y}px`;
                }
            }
        });
        updateLinePositions();
    }

    // --- 【全新的iPad/触屏设备高阶Touch事件深度适配逻辑】 ---
    workspaceContainer.addEventListener('touchstart', (e) => {
        // 先检查是否处于触控模式
        if (!isTouchMode) return;

    workspaceContainer.addEventListener('touchmove', (e) => {
        if (!isTouchMode) return;

            e.preventDefault();

            const currentCenterX = (t1.clientX + t2.clientX) / 2 - workspaceContainer.getBoundingClientRect().left;
            const currentCenterY = (t1.clientY + t2.clientY) / 2 - workspaceContainer.getBoundingClientRect().top;

            scale = ns;
            panX = currentCenterX - touchStartCenter.x * scale;
            panY = currentCenterY - touchStartCenter.y * scale;

            return;
        }

                if (Math.hypot(touch.clientX - lastTapX, touch.clientY - lastTapY) > 10) {

                    selectionStartY = lastTapY - rect.top;

                    selectionBox.style.top = `${selectionStartY}px`;

                    selectionBox.style.display = 'block';
                }

            }

                panX = touch.clientX - startPanX;
                panY = touch.clientY - startPanY;

                return;
            }

            if (isDraggingNode) {
                lastX = touch.clientX;
                lastY = touch.clientY;
                triggerNodeDragUpdate(null);
                return;
            }

            if (isConnecting) {
                lastX = touch.clientX;
                lastY = touch.clientY;

    workspaceContainer.addEventListener('touchend', (e) => {

            touchStartCenter = null;
        }

        if (e.touches.length === 0) {
            // --- 【滑完即关】：手指一离开屏幕（touchend）立刻推出并切回正常选择状态
            if (isScissorsMode) {
                isCutting = false;

                document.getElementById('sb-default').style.display = 'inline';
                document.getElementById('sb-scissors').style.display = 'none';

            }

                    let dx = doubleTapWorkspacePos.x - firstNode.x - firstNode.w/2;
                    let dy = doubleTapWorkspacePos.y - firstNode.y - firstNode.h/2;

                    cloneSourceOnTouch.forEach(item => {
                        const newId = generateId();
                        newIdsMap[item.id || item.originalId || generateId()] = newId;

                        const pastedImgs = (item.images || []).map(img => ({ ...img, id: generateId() }));
                        const pastedVids = (item.videos || []).map(vid => ({ ...vid, id: generateId() }));

                            item.x + dx, 
                            item.y + dy, 
                            item.title + " (复本)", 
                            item.content, 
                            item.w, 
                            item.h, 
                            newId, 
                            item.themeId, 
                            item.customColor,

                            item.fontSize,

            touchResizeCanvasNodeId = null;

    // 专属的复制并偏移粘贴函数
    function performPasteNodesOffset(dx, dy) {
        if (!copiedNodesClipboard || copiedNodesClipboard.length === 0) return;
        const newIdsMap = {}; 
        const pastedIds = [];

        copiedNodesClipboard.forEach(item => {
            const newId = generateId();
            newIdsMap[item.originalId] = newId;

            const pastedImgs = (item.images || []).map(img => ({ ...img, id: generateId() }));
            const pastedVids = (item.videos || []).map(vid => ({ ...vid, id: generateId() }));

            createNode(
                item.x + dx, 
                item.y + dy, 
                item.title + " (复本)", 
                item.content, 
                item.w, 
                item.h, 
                newId, 
                item.themeId, 
                item.customColor, 
                pastedImgs, 
                pastedVids, 
                item.imgCanvasHeight,
                item.fontSize,
                item.vidListHeight
            );
            pastedIds.push(newId);
        });

        connections.forEach(conn => {
            if (newIdsMap[conn.from] && newIdsMap[conn.to]) {
                connections.push({ from: newIdsMap[conn.from], to: newIdsMap[conn.to] });
            }
        });

        clearSelection();
        pastedIds.forEach(id => selectedNodes.add(id));
        updateSelectionVisuals();
        drawAllLines();
    }

            if (window.showSaveFilePicker) {
                const handle = await window.showSaveFilePicker({
                    suggestedName: 'story_flowchart.json',
                    types: [{ description: 'JSON 文件', accept: {'application/json': ['.json']} }]
                });
                const writable = await handle.createWritable();
                await writable.write(dataStr);
                await writable.close(); 
                return;
            }
        } catch (err) { 
            if (err.name === 'AbortError') return; 
        }
        
        const blob = new Blob([dataStr], { type: 'application/json;charset=utf-8' });

        // iOS Safari兼容：优先使用系统分享面板（隔空投送/保存到文件等）
        if (navigator.share && navigator.canShare) {
            try {
                const file = new File([blob], 'story_flowchart.json', { type: 'application/json' });
                if (navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: '导出流程图' });
                    return;
                }
            } catch (err) {
                if (err.name === 'AbortError') return;
            }
        }

        // 其他移动端/桌面端：尝试下载
        try {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); 
            a.href = url;
            a.download = 'story_flowchart.json'; 
            document.body.appendChild(a); 
            a.click(); 
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch(e) {
            // 最终回退：弹窗显示JSON内容供手动复制
            prompt("下载失败，请手动复制保存：", dataStr);
        }
    });

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data && data.nodes && data.connections) {
                        saveUndoState();
                        nodesContainer.innerHTML = ''; svgBg.innerHTML = ''; svgFg.innerHTML = ''; document.getElementById('groups-container').innerHTML = ''; nodes = {}; connections = []; groups = []; selectedNodes.clear(); selectedLineIndices.clear();
                        scale = data.scale || 1; panX = data.panX || 0; panY = data.panY || 0; updateWorkspaceTransform();
                        nodes = data.nodes;
                        Object.keys(nodes).forEach(id => {
                            const n = nodes[id];
                            if(n.image && !n.images) { n.images = [{id:generateId(), src:n.image, x:20, y:20, w:100, h:100, rot:0, z:0}]; delete n.image; }
                            createNode(n.x, n.y, n.title, n.content, n.w, n.h, id, n.themeId, n.customColor, n.images, n.videos, n.imgCanvasHeight, n.fontSize, n.vidListHeight);
                        });
                        connections = data.connections; drawAllLines();
                        if (data.groups) {
                            groups = data.groups.map(g => ({...g, nodeIds: new Set(g.nodeIds)}));
                            renderAllGroups();
                        }
                        if (data.palette) {
                            data.palette.forEach((c, i) => { if (nodeThemes[i] && c) { nodeThemes[i].bg = c; nodeThemes[i].header = c; nodeThemes[i].border = c; } });
                            savePalette(); renderSwatches();
                        }
                    }
                } catch (err) { alert("读取存档失败！文件格式不正确或已损坏。"); }
            };
            reader.readAsText(file);
        }
        this.value = '';
    });

    document.getElementById('image-upload-input').addEventListener('change', function(e) {
        if(!window.activeMediaNode) return;
        Array.from(e.target.files).forEach(file => {
            const r = new FileReader();
            r.onload = (ev) => {
                const n = nodes[window.activeMediaNode]; const tempImg = new Image();
                tempImg.onload = () => {
                    let initW = tempImg.width, initH = tempImg.height; if (initW > 120) { initH = (120 / initW) * initH; initW = 120; }
                    n.images.push({ id: generateId(), src: ev.target.result, x: 10 + (n.images.length*10)%50, y: 10 + (n.images.length*10)%50, w: initW, h: initH, rot: 0, z: n.images.length });
                    renderNodeMedia(window.activeMediaNode);
                }; tempImg.src = ev.target.result;
            }; r.readAsDataURL(file);
        }); this.value = '';
    });

    document.getElementById('video-upload-input').addEventListener('change', function(e) {
        if(!window.activeMediaNode) return;
        const f = e.target.files[0]; if(!f) return;
        nodes[window.activeMediaNode].videos.push({id: generateId(), name: f.name, originalName: f.name, src: URL.createObjectURL(f)});
        renderNodeMedia(window.activeMediaNode); this.value = '';
    });

    document.getElementById('toolbar-color-btn').addEventListener('click', (e) => { 
        e.stopPropagation(); 
        document.getElementById('color-palette').classList.toggle('show'); 
    });

    document.getElementById('custom-color-input').addEventListener('input', (e) => { 
        if (selectedGroupId) {
            saveUndoState();
            applyGroupColor(selectedGroupId, e.target.value);
        } else if (selectedNodes.size > 0) { saveUndoState(); selectedNodes.forEach(id => applyNodeColor(id, null, e.target.value)); }
    });

    // --- 【悬浮按钮事件绑定】 ---
    const panToggleBtn = document.getElementById('pan-toggle-btn');
    const snapToggleBtn = document.getElementById('snap-toggle-btn');
    const gridToggleBtn = document.getElementById('grid-toggle-btn');
    const scissorsToggleBtn = document.getElementById('scissors-toggle-btn');
    const deviceToggleBtn = document.getElementById('device-toggle-btn');

    panToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        isPanMode = !isPanMode;
        panToggleBtn.classList.toggle('active', isPanMode);
        document.body.classList.toggle('pan-cursor-active', isPanMode);
    });

    snapToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        isGridSnap = !isGridSnap;
        snapToggleBtn.classList.toggle('active', isGridSnap);
        if (isGridSnap) {
            Object.keys(nodes).forEach(id => {
                nodes[id].x = Math.round(nodes[id].x / 30) * 30;
                nodes[id].y = Math.round(nodes[id].y / 30) * 30;
                const el = document.getElementById(id);
                if (el) {
                    el.style.left = `${nodes[id].x}px`;
                    el.style.top = `${nodes[id].y}px`;
                }
            });
            updateLinePositions();
        }
    });

    gridToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        isGridVisible = !isGridVisible;
        gridToggleBtn.classList.toggle('active', isGridVisible);
        workspaceContainer.classList.toggle('grid-hidden', !isGridVisible);
    });

    // --- 【iOS兼容：剪刀模式按钮（三指手势在iOS Safari上被系统拦截不可用）】 ---
    function toggleScissorsMode() {
        isScissorsMode = !isScissorsMode;
        if (isScissorsMode) {
            document.body.classList.add('scissors-mode');
            document.getElementById('sb-default').style.display = 'none';
            document.getElementById('sb-scissors').style.display = 'inline';
        } else {
            document.body.classList.remove('scissors-mode');
            document.getElementById('sb-default').style.display = 'inline';
            document.getElementById('sb-scissors').style.display = 'none';
            cutPath = []; drawCutPath();
        }
        scissorsToggleBtn.classList.toggle('active', isScissorsMode);
    }
    scissorsToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleScissorsMode();
    });

    document.getElementById('group-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        groupSelectedNodes();
    });
    document.getElementById('ungroup-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        ungroupSelectedNodes();
    });

    // --- 【设备识别与键鼠/触控动态转换器】 ---
    function detectDeviceAndApply() {
        const hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const hasMouse = window.matchMedia('(pointer:fine)').matches;
        // 纯触屏设备（手机/iPad无鼠标）→ 触控模式；有鼠标的设备 → 键鼠模式
        isTouchMode = hasTouch && !hasMouse;
        updateDeviceUI();
        // 如果初始判定为键鼠，但后续收到 touchstart，自动切换为触控
        if (!isTouchMode) {
            const autoSwitch = (e) => {
                if (e.touches && e.touches.length > 0) {
                    isTouchMode = true;
                    updateDeviceUI();
                    workspaceContainer.removeEventListener('touchstart', autoSwitch);
                }
            };
            workspaceContainer.addEventListener('touchstart', autoSwitch);
        }
    }

    function updateDeviceUI() {
        if (isTouchMode) {
            deviceToggleBtn.innerHTML = '<i class="fas fa-fingerprint"></i>';
            deviceToggleBtn.title = "当前模式：触控手势操作 (轻触切换至键鼠)";
            deviceToggleBtn.classList.add('active');
            document.body.classList.add('touch-mode-active');
        } else {
            deviceToggleBtn.innerHTML = '<i class="fas fa-desktop"></i>';
            deviceToggleBtn.title = "当前模式：标准键鼠操作 (轻触切换至触控)";
            deviceToggleBtn.classList.remove('active');
            document.body.classList.remove('touch-mode-active');
        }
    }

    deviceToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        isTouchMode = !isTouchMode;
        updateDeviceUI();
    });

    // 初始化运行环境自检
    detectDeviceAndApply();
    updateWorkspaceTransform(); 
    createNode(200, 150, "故事开端", "你从昏迷中醒来...");

    // --- 【初始化浅色/深色默认状态】 ---
    const themeBtn = document.getElementById('theme-toggle-btn');
    if (isLightMode) {
        themeBtn.innerHTML = '<i class="fas fa-moon"></i> 深色模式';
        themeBtn.style.backgroundColor = '#374151';
        document.body.classList.add('light-mode');
        Object.keys(nodes).forEach(id => applyNodeColor(id, nodes[id].themeId, nodes[id].customColor));
    }

    // ============================================================
    //  搜索功能
    // ============================================================
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');

    searchInput.addEventListener('input', () => {
        const q = searchInput.value.trim().toLowerCase();
        if (!q) { searchResults.style.display = 'none'; return; }
        const matches = [];
        for (let id in nodes) {
            const n = nodes[id];
            const titleMatch = (n.title || '').toLowerCase().includes(q);
            const contentMatch = (n.content || '').toLowerCase().includes(q);
            if (titleMatch || contentMatch) matches.push({ id, n, titleMatch, contentMatch });
        }
        if (matches.length === 0) {
            searchResults.innerHTML = '<div style="padding:10px;color:#888;font-size:12px;">无匹配结果</div>';
        } else {
            searchResults.innerHTML = matches.slice(0, 20).map(m => {
                const hlTitle = highlightMatch(m.n.title || '未命名', q);
                const hlContent = highlightMatch((m.n.content || '').substring(0, 60), q);
                return `<div class="search-item" data-id="${m.id}"><div class="si-title">${hlTitle}</div>${hlContent ? `<div class="si-content">${hlContent}</div>` : ''}</div>`;
            }).join('');
            searchResults.querySelectorAll('.search-item').forEach(item => {
                item.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    navigateToNode(item.dataset.id);
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                });
            });
        }
        searchResults.style.display = 'block';
    });

    searchInput.addEventListener('blur', () => { setTimeout(() => { searchResults.style.display = 'none'; }, 250); });
    searchInput.addEventListener('focus', () => { if (searchInput.value.trim()) searchInput.dispatchEvent(new Event('input')); });
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const first = searchResults.querySelector('.search-item');
            if (first) { navigateToNode(first.dataset.id); searchResults.style.display = 'none'; searchInput.value = ''; }
        }
    });

    function highlightMatch(text, q) {
        if (!text || !q) return text || '';
        const idx = text.toLowerCase().indexOf(q);
        if (idx === -1) return text;
        return text.substring(0, idx) + '<mark>' + text.substring(idx, idx + q.length) + '</mark>' + text.substring(idx + q.length);
    }

    function navigateToNode(nodeId) {
        const n = nodes[nodeId]; if (!n) return;
        const containerRect = workspaceContainer.getBoundingClientRect();
        const targetScreenX = n.x + n.w / 2;
        const targetScreenY = n.y + n.h / 2;
        panX = containerRect.width / 2 - targetScreenX * scale;
        panY = containerRect.height / 2 - targetScreenY * scale;
        updateWorkspaceTransform();
        // 高亮闪烁
        const el = document.getElementById(nodeId);
        if (el) {
            el.classList.remove('highlight-flash');
            void el.offsetWidth;
            el.classList.add('highlight-flash');
            setTimeout(() => el.classList.remove('highlight-flash'), 4000);
        }
    }

    // ============================================================
    //  小地图功能
    // ============================================================
    const minimapEl = document.getElementById('minimap');
    const minimapCanvas = document.getElementById('minimap-canvas');
    const minimapCtx = minimapCanvas.getContext('2d');
    const minimapToggleBtn = document.getElementById('minimap-toggle-btn');
    let minimapVisible = false;
    let minimapDragging = false;

    minimapToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        minimapVisible = !minimapVisible;
        minimapEl.style.display = minimapVisible ? 'block' : 'none';
        minimapToggleBtn.classList.toggle('active', minimapVisible);
        if (minimapVisible) { drawMinimap(); markMinimapDirty(); }
    });

    function drawMinimap() {
        if (!minimapVisible) return;
        const rect = minimapEl.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const W = 200, H = 150;
        minimapCanvas.width = W * dpr;
        minimapCanvas.height = H * dpr;
        minimapCanvas.style.width = W + 'px';
        minimapCanvas.style.height = H + 'px';
        minimapCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        minimapCtx.clearRect(0, 0, W, H);

        const nodeIds = Object.keys(nodes);
        if (nodeIds.length === 0) return;

        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        nodeIds.forEach(id => {
            const n = nodes[id];
            minX = Math.min(minX, n.x);
            minY = Math.min(minY, n.y);
            maxX = Math.max(maxX, n.x + n.w);
            maxY = Math.max(maxY, n.y + n.h);
        });

        const pad = 80;
        minX -= pad; minY -= pad; maxX += pad; maxY += pad;
        const worldW = maxX - minX || 1;
        const worldH = maxY - minY || 1;
        const fitScale = Math.min(W / worldW, H / worldH);
        const offX = (W - worldW * fitScale) / 2;
        const offY = (H - worldH * fitScale) / 2;

        function toMini(wx, wy) {
            return { x: offX + (wx - minX) * fitScale, y: offY + (wy - minY) * fitScale };
        }

        // 编组
        groups.forEach(g => {
            let gMinX = Infinity, gMinY = Infinity, gMaxX = -Infinity, gMaxY = -Infinity;
            g.nodeIds.forEach(id => {
                const n = nodes[id];
                if (!n) return;
                gMinX = Math.min(gMinX, n.x);
                gMinY = Math.min(gMinY, n.y);
                gMaxX = Math.max(gMaxX, n.x + n.w);
                gMaxY = Math.max(gMaxY, n.y + n.h);
            });
            if (gMinX === Infinity) return;
            const gp1 = toMini(gMinX - 20, gMinY - 20);
            const gp2 = toMini(gMaxX + 20, gMaxY + 20);
            minimapCtx.fillStyle = g.color;
            minimapCtx.fillRect(gp1.x, gp1.y, gp2.x - gp1.x, gp2.y - gp1.y);
            minimapCtx.strokeStyle = g.borderColor;
            minimapCtx.lineWidth = 1;
            minimapCtx.strokeRect(gp1.x, gp1.y, gp2.x - gp1.x, gp2.y - gp1.y);
        });

        // 连线
        minimapCtx.strokeStyle = isLightMode ? 'rgba(59,130,246,0.35)' : 'rgba(96,165,250,0.45)';
        minimapCtx.lineWidth = 1;
        connections.forEach(conn => {
            const f = nodes[conn.from], t = nodes[conn.to];
            if (!f || !t) return;
            const p1 = toMini(f.x + f.w, f.y + f.h / 2);
            const p2 = toMini(t.x, t.y + t.h / 2);
            minimapCtx.beginPath();
            minimapCtx.moveTo(p1.x, p1.y);
            minimapCtx.lineTo(p2.x, p2.y);
            minimapCtx.stroke();
        });

        // 节点
        nodeIds.forEach(id => {
            const n = nodes[id];
            const p = toMini(n.x, n.y);
            const nw = Math.max(n.w * fitScale, 3);
            const nh = Math.max(n.h * fitScale, 3);
            let color = n.customColor || (n.themeId && nodeThemes[n.themeId] ? nodeThemes[n.themeId].header : null);
            if (!color || color.startsWith('var(')) color = isLightMode ? '#6b7280' : '#60a5fa';
            minimapCtx.fillStyle = color;
            minimapCtx.globalAlpha = selectedNodes.has(id) ? 1 : 0.65;
            minimapCtx.fillRect(p.x, p.y, nw, nh);
        });
        minimapCtx.globalAlpha = 1;

        // 视口
        const cRect = workspaceContainer.getBoundingClientRect();
        const vpL = -panX / scale, vpT = -panY / scale;
        const vpW = cRect.width / scale, vpH = cRect.height / scale;
        const vp1 = toMini(vpL, vpT), vp2 = toMini(vpL + vpW, vpT + vpH);
        minimapCtx.strokeStyle = isLightMode ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.8)';
        minimapCtx.lineWidth = 1.5;
        minimapCtx.strokeRect(vp1.x, vp1.y, vp2.x - vp1.x, vp2.y - vp1.y);
        minimapCtx.fillStyle = isLightMode ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.08)';
        minimapCtx.fillRect(vp1.x, vp1.y, vp2.x - vp1.x, vp2.y - vp1.y);

        minimapEl._mapData = { minX, minY, fitScale, offX, offY };
    }

    minimapCanvas.addEventListener('mousedown', (e) => { minimapDragging = true; minimapNavigate(e); });
    minimapCanvas.addEventListener('mousemove', (e) => { if (minimapDragging) minimapNavigate(e); });
    window.addEventListener('mouseup', () => { minimapDragging = false; });
    minimapCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); minimapDragging = true; minimapNavigate(e.touches[0]); }, { passive: false });
    minimapCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (minimapDragging) minimapNavigate(e.touches[0]); }, { passive: false });
    minimapCanvas.addEventListener('touchend', () => { minimapDragging = false; });

    function minimapNavigate(e) {
        const data = minimapEl._mapData; if (!data) return;
        const rect = minimapCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const worldX = (mx - data.offX) / data.fitScale + data.minX;
        const worldY = (my - data.offY) / data.fitScale + data.minY;
        const cRect = workspaceContainer.getBoundingClientRect();
        panX = cRect.width / 2 - worldX * scale;
        panY = cRect.height / 2 - worldY * scale;
        updateWorkspaceTransform();
        drawMinimap();
    }

    // 持续刷新小地图：事件驱动，仅在脏标记置位时重绘
    function minimapLoop() {
        if (minimapVisible && minimapDirty) { minimapDirty = false; drawMinimap(); }
        requestAnimationFrame(minimapLoop);
    }
    requestAnimationFrame(minimapLoop);

</script>
</body>
